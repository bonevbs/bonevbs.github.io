name: deploy

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    steps:
    - name: Checkout 🛎️
      uses: actions/checkout@v3
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2.2'
        bundler-cache: true
    - name: Update _config.yml ⚙️
      uses: fjogeleit/yaml-update-action@v0.13.1
      with:
        commitChange: false
        valueFile: '_config.yml'
        propertyPath: 'giscus.repo'
        value: ${{ github.repository }}
    - name: Cache publication previews
      uses: actions/cache@v4
      with:
        path: |
          assets/img/publication_preview
          _data/generated_previews.yml
        key: pub-previews-${{ hashFiles('_bibliography/papers.bib') }}
        restore-keys: |
          pub-previews-
    - name: Generate publication previews
      if: ${{ vars.SKIP_PUBLICATION_PREVIEWS != 'true' }}
      run: |
        sudo apt-get update
        sudo apt-get install -y poppler-utils ghostscript imagemagick
        python3 bin/generate_publication_previews.py
    - name: Install and Build 🔧
      run: |
        pip3 install --upgrade jupyter
        npm install -g mermaid.cli
        npm install -g purgecss
        export JEKYLL_ENV=production
        bundle exec jekyll build --lsi
        purgecss -c purgecss.config.js
    - name: Deploy 🚀
      if: github.event_name != 'pull_request'
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: _site